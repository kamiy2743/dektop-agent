name: desktop-agent-prd

services:
  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu22.04-0.26.0-dev
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:20011:50021"
    networks:
      - egress
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    env_file:
      - .env.prd
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql/
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:20012:3306"
    networks:
      - egress
    restart: unless-stopped

networks:
  egress:

volumes:
  mysql-data:
